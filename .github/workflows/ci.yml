name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node:
          - 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run CI checks
        run: npm run ci

      - name: Smoke test Electron packaging
        run: npm run desktop:build

      - name: Upload packaged app artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ci-packages-${{ matrix.os }}
          path: dist-electron/*
          if-no-files-found: error
          retention-days: 7
